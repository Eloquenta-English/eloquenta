<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Classroom — Eloquenta Enhanced</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0f1a; color:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; height:100vh; }
.sidebar { width:260px; background:#111827; border-right:1px solid #374151; display:flex; flex-direction:column; z-index:10; }
.sidebar-header { padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
.logo { font-size:18px; font-weight:700; }
.logo em { color:#22d3ee; }
.theme-picker-btn { width:36px; height:36px; border-radius:50%; border:1px solid #374151; background:#111827; color:#94a3b8; cursor:pointer; transition:all .2s; }
.theme-picker-btn:hover { transform:scale(1.1); border-color:#22d3ee; }
.video-stage { flex:1; position:relative; background:#0a0f1a; }
.video-window { position:absolute; border-radius:12px; overflow:hidden; background:#111827; z-index:5; transition:all .2s; box-shadow:0 4px 24px rgba(0,0,0,.5); }
.video-window:hover { box-shadow:0 8px 36px rgba(0,0,0,.7); }
.main-video { top:50%; left:50%; transform:translate(-50%,-50%); width:70%; height:70%; }
.pip-video { bottom:16px; right:16px; width:200px; height:120px; }
.win-minimize { position:absolute; top:4px; right:4px; opacity:0; transition:all .2s; cursor:pointer; border:none; background:rgba(0,0,0,.5); color:#fff; border-radius:4px; }
.video-window:hover .win-minimize { opacity:1; }
.video-label { position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.65); padding:3px 10px; border-radius:6px; font-size:11px; }
.bottom-controls { padding:16px; display:flex; gap:12px; justify-content:center; }
.ctrl-btn { width:48px; height:48px; border-radius:50%; border:none; background:#1f2937; color:#f1f5f9; cursor:pointer; transition:all .2s; }
.ctrl-btn:hover { transform:scale(1.12); background:#374151; }
.theme-picker-panel { position:fixed; bottom:60px; right:16px; z-index:90; background:#111827; border:1px solid #374151; border-radius:12px; padding:12px; width:200px; box-shadow:0 8px 24px rgba(0,0,0,.4); display:none; flex-direction:column; gap:8px; }
.theme-picker-panel.open { display:flex; }
.theme-preset-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.theme-preset { width:38px; height:38px; border-radius:8px; cursor:pointer; transition:all .2s; }
.theme-preset:hover { transform:scale(1.12); border:2px solid #22d3ee; }
@keyframes sparkle-fall { 0%{transform:translateY(-100px) rotate(0deg);opacity:0} 10%{opacity:1} 100%{transform:translateY(400px) rotate(360deg);opacity:0} }
.sparkle { position:absolute; width:6px; height:6px; background:#22d3ee; border-radius:50%; box-shadow:0 0 8px #22d3ee; z-index:100; animation:sparkle-fall 1.2s ease-out forwards; }
@keyframes swish { 0%{transform:translate(-50%,-50%) scale(0);opacity:0.8} 100%{transform:translate(-50%,-50%) scale(1.5);opacity:0} }
</style></head><body>
<div class="app">
<aside class="sidebar"><div class="sidebar-header"><span class="logo">Eloqu<span class="o">e</span>nta</span><button class="theme-picker-btn" id="themePickerBtn">🎨</button></div></aside>
<main class="main"><div class="video-stage" id="video-stage">
<div class="video-window main-video" id="main-video-wrap"><button class="win-minimize" onclick="minimizeWindow('main-video-wrap')">—</button><video id="remote-video" autoplay playsinline></video><div class="video-label">Remote</div></div>
<div class="video-window pip-video" id="pip-video-wrap"><button class="win-minimize" onclick="minimizeWindow('pip-video-wrap')">—</button><video id="local-video" autoplay playsinline muted></video><div class="video-label">You</div></div>
<div class="bottom-controls"><button class="ctrl-btn" onclick="toggleMic()">🎤</button><button class="ctrl-btn" onclick="toggleCam()">📷</button><button class="ctrl-btn" onclick="shareScreen()">🖥️</button><button class="ctrl-btn" onclick="leaveRoom()">📴</button></div>
</div></main></div>
<div class="theme-picker-panel" id="themePickerPanel"><span>Themes</span><div class="theme-preset-grid" id="themePresets">
<button class="theme-preset" data-theme="default" style="background:#22d3ee"></button>
<button class="theme-preset" data-theme="ocean" style="background:#3b82f6"></button>
<button class="theme-preset" data-theme="forest" style="background:#22c55e"></button>
<button class="theme-preset" data-theme="sunset" style="background:#f97316"></button>
</div></div>
<script>(function(){
var audioCtx=null;
function playSwish(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.value=800;g.gain.value=0.08;o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.1);}
function createSparkle(x,y){var s=document.createElement("div");s.className="sparkle";s.style.left=x+"px";s.style.top=y+"px";document.body.appendChild(s);setTimeout(function(){s.remove();},1200);}
document.querySelectorAll(".ctrl-btn").forEach(function(el){el.addEventListener("click",playSwish);});
var THEMES={default:"#22d3ee",ocean:"#3b82f6",forest:"#22c55e",sunset:"#f97316"};
document.getElementById("themePresets").addEventListener("click",function(e){if(e.target.classList.contains("theme-preset")){document.documentElement.style.setProperty("--accent",THEMES[e.target.dataset.theme]);localStorage.setItem("elo_theme",e.target.dataset.theme);playSwish();}});
})();</script>
</body></html>
