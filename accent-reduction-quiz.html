<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accent Reduction Quiz</title>
<style>
  :root {
    --bg-deep: #0f172a;
    --bg-card: #1e293b;
    --text: #e2e8f0;
    --text-muted: #cbd5e1;
    --accent: #38bdf8;
    --correct: #34d399;
    --wrong: #f87171;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg-deep);
    color: var(--text);
    font-family: "Segoe UI", system-ui, Arial, sans-serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .wrap {
    width: 80vw;
    max-width: 760px;
  }
  h1 { font-size: 30px; line-height: 1.3; margin: 0 0 8px; }
  h2 { font-size: 22px; line-height: 1.4; margin: 0 0 12px; }
  p.lead { color: var(--text-muted); margin: 0 0 24px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .q-num { font-size: 15px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
  fieldset { border: none; margin: 16px 0 0; padding: 0; }
  legend { font-weight: 600; margin-bottom: 12px; }
  label.opt {
    display: block;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  label.opt:hover { border-color: var(--accent); }
  label.opt input { margin-right: 12px; }
  label.opt.correct { border-color: var(--correct); background: rgba(52,211,153,.12); }
  label.opt.wrong { border-color: var(--wrong); background: rgba(248,113,113,.12); }
  .explain {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
    background: rgba(56,189,248,.08);
    border-radius: 0 8px 8px 0;
    color: var(--text-muted);
  }
  .explain.show { display: block; }
  .nav { display: flex; gap: 12px; margin-top: 8px; }
  button {
    font: inherit;
    font-weight: 600;
    background: var(--accent);
    color: #0f172a;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    cursor: pointer;
  }
  button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .result { text-align: center; }
  .score-big { font-size: 48px; font-weight: 700; color: var(--accent); margin: 8px 0; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div id="intro" class="card">
    <h1>Accent Reduction Quiz</h1>
    <p class="lead">Five short questions on the sounds and patterns that most affect spoken clarity for English learners. Pick the best answer, then check the explanation.</p>
    <div class="nav">
      <button onclick="startQuiz()">Start quiz</button>
    </div>
  </div>

  <div id="quiz" class="hidden"></div>

  <div id="result" class="card result hidden">
    <h2>Your result</h2>
    <div class="score-big"><span id="finalScore">0</span> / 5</div>
    <p id="resultText" class="lead"></p>
    <div class="nav" style="justify-content:center;">
      <button onclick="restart()">Try again</button>
    </div>
  </div>
</div>

<script>
  const questions = [
    {
      q: "Which two English sounds do many learners from East Asian language backgrounds most often merge, so that \"rice\" and \"lice\" sound the same?",
      options: [
        "the /l/ and /r/ sounds",
        "the /f/ and /h/ sounds",
        "the /b/ and /p/ sounds",
        "the /s/ and /sh/ sounds"
      ],
      answer: 0,
      explain: "The /l/ and /r/ distinction is the classic merger. In English /r/ is voiced with the tongue tip near the roof but not touching, while /l/ is made with the tongue tip firmly on the alveolar ridge. Practising minimal pairs (light / right, lake / rake) builds the contrast."
    },
    {
      q: "To make the voiceless \"th\" sound in the word \"think\", where should your tongue be?",
      options: [
        "Behind your bottom teeth",
        "Between your top teeth and the tip of your tongue",
        "Flat on the roof of your mouth",
        "Touching the back of your throat"
      ],
      answer: 1,
      explain: "The /θ/ in \"think\" is a dental fricative: the tongue tip rests gently between or just behind the top front teeth while air flows out. Learners often replace it with /s/ (\"sink\") or /f/ (\"fink\") because their language lacks a dental sound."
    },
    {
      q: "In the word \"photographer\", which syllable carries the main stress?",
      options: [
        "PHO (first syllable)",
        "TO (third syllable)",
        "graph (second syllable)",
        "er (final syllable)"
      ],
      answer: 1,
      explain: "Stress shifts with the suffix: PHOtograph (2nd), phoTOgrapher (3rd), phoTOgraphic (3rd). Misplaced stress on long words is a major clarity issue. Marking the stressed syllable louder, longer, and higher in pitch fixes it."
    },
    {
      q: "The words \"ship\" and \"sheep\" differ mainly in which feature?",
      options: [
        "The first is voiced, the second voiceless",
        "Vowel length and quality: /ɪ/ is short, /iː/ is long",
        "The number of syllables",
        "The final consonant"
      ],
      answer: 1,
      explain: "These are minimal pairs on vowel length and quality. /ɪ/ in \"ship\" is short and relaxed; /iː/ in \"sheep\" is long and tense. English uses vowel length contrastively, so holding \"sheep\" noticeably longer prevents confusion."
    },
    {
      q: "Which unstressed vowel sound is the most common reduction in fast, natural English speech?",
      options: [
        "the pure /iː/ sound",
        "the schwa /ə/",
        "the /ɔː/ sound",
        "a silent, deleted vowel"
      ],
      answer: 1,
      explain: "The schwa /ə/ is the neutral, relaxed vowel heard in the first syllable of \"about\" or \"banana\". Reducing unstressed syllables to schwa makes speech sound natural and fluent; over-articulating every vowel is what makes non-native speech sound stilted."
    }
  ];

  let current = 0;
  let score = 0;
  let answered = [];

  function startQuiz() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    current = 0;
    score = 0;
    answered = new Array(questions.length).fill(false);
    renderQuestion();
  }

  function renderQuestion() {
    const quiz = document.getElementById("quiz");
    quiz.classList.remove("hidden");
    const item = questions[current];
    let opts = "";
    item.options.forEach((opt, i) => {
      opts += '<label class="opt" id="opt' + i + '"><input type="radio" name="q" value="' + i + '" onchange="reveal(' + i + ')"> ' + opt + '</label>';
    });
    quiz.innerHTML =
      '<div class="card">' +
        '<div class="q-num">Question ' + (current + 1) + ' of ' + questions.length + '</div>' +
        '<h2>' + item.q + '</h2>' +
        '<fieldset><legend>Choose the best answer:</legend>' + opts + '</fieldset>' +
        '<div class="explain" id="explain">' + item.explain + '</div>' +
        '<div class="nav">' +
          (current > 0 ? '<button class="secondary" onclick="prev()">Back</button>' : '') +
          (current < questions.length - 1
            ? '<button id="nextBtn" disabled onclick="next()">Next</button>'
            : '<button id="nextBtn" disabled onclick="finish()">See result</button>') +
        '</div>' +
      '</div>';
    if (answered[current]) restoreState();
  }

  function reveal(choice) {
    const item = questions[current];
    const explain = document.getElementById("explain");
    const opts = document.querySelectorAll('input[name="q"]');
    opts.forEach(inp => inp.disabled = true);
    for (let i = 0; i < item.options.length; i++) {
      const lbl = document.getElementById("opt" + i);
      if (i === item.answer) lbl.classList.add("correct");
      else if (i === choice) lbl.classList.add("wrong");
    }
    explain.classList.add("show");
    document.getElementById("nextBtn").disabled = false;
    if (!answered[current]) {
      answered[current] = true;
      if (choice === item.answer) score++;
    }
  }

  function restoreState() {
    const item = questions[current];
    const radios = document.querySelectorAll('input[name="q"]');
    radios.forEach(r => r.disabled = true);
    for (let i = 0; i < item.options.length; i++) {
      const lbl = document.getElementById("opt" + i);
      if (i === item.answer) lbl.classList.add("correct");
      else if (i === answeredChoice(current)) lbl.classList.add("wrong");
    }
    document.getElementById("explain").classList.add("show");
    document.getElementById("nextBtn").disabled = false;
  }

  function answeredChoice(idx) {
    const item = questions[idx];
    // Only meaningful if answered; stored implicitly via DOM, but recompute from score not needed.
    return -1;
  }

  function next() {
    if (current < questions.length - 1) { current++; renderQuestion(); }
  }

  function prev() {
    if (current > 0) { current--; renderQuestion(); }
  }

  function finish() {
    document.getElementById("quiz").classList.add("hidden");
    const res = document.getElementById("result");
    res.classList.remove("hidden");
    document.getElementById("finalScore").textContent = score;
    let msg;
    if (score === 5) msg = "Excellent. You have a solid grasp of the features that matter most for clear pronunciation.";
    else if (score >= 3) msg = "Good work. Focus your practice on the questions you missed — those are your highest-impact areas.";
    else msg = "A useful starting point. Revisit the explanations and drill the sound contrasts that tripped you up.";
    document.getElementById("resultText").textContent = msg;
  }

  function restart() {
    document.getElementById("result").classList.add("hidden");
    startQuiz();
  }
</script>
</body>
</html>
